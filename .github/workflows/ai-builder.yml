name: Codex Run

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to branch off from and open the PR back into.
        required: true
        type: string
      prompt:
        description: Exact Codex prompt to execute for this run.
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  codex-run:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ inputs.target_branch }}
      PROMPT: ${{ inputs.prompt }}
      CODEX_MODEL: gpt-5.3-codex
      CODEX_VERSION: 0.116.0
      CODEX_SANDBOX: danger-full-access
      CODEX_ARGS: '["--search"]'
      CODEX_SAFETY_STRATEGY: drop-sudo
      RUN_PREDICATE_TYPE: https://verifiable-codex.dev/codex-run/v1
    steps:
      - name: Set dynamic environment variables
        run: |
          {
            echo "META_DIR=${RUNNER_TEMP}/codex-run"
            echo "CODEX_OUTPUT_FILE=${RUNNER_TEMP}/codex-run/codex-output.md"
            echo "PREDICATE_FILE=${RUNNER_TEMP}/codex-run/codex-run-predicate.json"
            echo "PR_BODY_FILE=${RUNNER_TEMP}/codex-run/pr-body.md"
            echo "SNAPSHOT_FILE=${RUNNER_TEMP}/codex-run/branch-snapshot.tar"
          } >> "${GITHUB_ENV}"

      - name: Check out workflow repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare target and run branches
        run: |
          set -euo pipefail

          mkdir -p "${META_DIR}"

          if ! git check-ref-format --branch "${TARGET_BRANCH}" >/dev/null 2>&1; then
            echo "Invalid target branch name: ${TARGET_BRANCH}" >&2
            exit 1
          fi

          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          target_branch_slug="$(printf '%s' "${TARGET_BRANCH}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g; s/^(.{48}).*$/\1/')"
          target_branch_slug="${target_branch_slug:-branch}"
          prompt_compact="$(printf '%s' "${PROMPT}" | tr '\r\n\t' ' ' | tr -s '[:space:]' ' ' | sed -E 's/^ //; s/ $//')"
          prompt_summary="$(printf '%s' "${prompt_compact}" | sed -E 's/^(.{0,41}).*$/\1/; s#[ .,:;_/-]+$##')"
          prompt_summary="${prompt_summary:-run}"
          if [[ ${#prompt_compact} -gt 41 && "${prompt_summary}" != "run" ]]; then
            prompt_summary="${prompt_summary}..."
          fi

          run_branch="codex/run/${timestamp}-${target_branch_slug}"
          target_branch_created=false

          if git ls-remote --exit-code --heads origin "refs/heads/${TARGET_BRANCH}" >/dev/null 2>&1; then
            git fetch --no-tags origin "+refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}"
            git switch --detach "origin/${TARGET_BRANCH}" >/dev/null
            base_sha="$(git rev-parse HEAD)"
            git switch --create "${run_branch}" >/dev/null
          else
            target_branch_created=true
            git switch --orphan "__codex_init_${timestamp}" >/dev/null
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git clean -fdx >/dev/null 2>&1 || true
            git -c commit.gpgsign=false commit --allow-empty -m "chore: initialize ${TARGET_BRANCH}" >/dev/null
            base_sha="$(git rev-parse HEAD)"
            git push origin "HEAD:refs/heads/${TARGET_BRANCH}"
            git branch -M "${run_branch}"
          fi

          {
            echo "BASE_SHA=${base_sha}"
            echo "RUN_BRANCH=${run_branch}"
            echo "PROMPT_SUMMARY=${prompt_summary}"
            echo "TARGET_BRANCH_CREATED=${target_branch_created}"
          } >> "${GITHUB_ENV}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Codex
        shell: bash
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          set -euo pipefail

          # Install the specific version of Codex CLI
          npm i -g @openai/codex@${CODEX_VERSION}

          # Keep auth isolated to this step only.
          export HOME="$RUNNER_TEMP/codex-home"
          mkdir -p "$HOME/.codex"
          chmod 700 "$HOME/.codex"

          cleanup() {
            shred -u "$HOME/.codex/auth.json" 2>/dev/null || rm -f "$HOME/.codex/auth.json"
          }
          trap cleanup EXIT

          printf '%s' "$CODEX_AUTH_JSON" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"
          unset CODEX_AUTH_JSON

          codex login status

          # Parse JSON array CODEX_ARGS into a bash array
          eval "EXTRA_ARGS=($(echo "$CODEX_ARGS" | jq -r '.[] | @sh'))"

          # Execute codex and pass the prompt via stdin
          printf '%s' "$PROMPT" | codex exec \
            --model "$CODEX_MODEL" \
            --sandbox "$CODEX_SANDBOX" \
            --safety-strategy "$CODEX_SAFETY_STRATEGY" \
            --output-file "$CODEX_OUTPUT_FILE" \
            "${EXTRA_ARGS[@]}" \
            -

      - name: Finalize commit, snapshot, predicate, and PR body
        env:
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          if [[ ! -f "${CODEX_OUTPUT_FILE}" ]]; then
            echo "Missing required file: ${CODEX_OUTPUT_FILE}" >&2
            exit 1
          fi

          commit_title="codex: ${PROMPT_SUMMARY}"
          commit_message_file="$(mktemp)"

          cat > "${commit_message_file}" <<EOF
          ${commit_title}

          Prompt:
          ${PROMPT}

          Target-Branch: ${TARGET_BRANCH}
          Base-SHA: ${BASE_SHA}
          Run-Branch: ${RUN_BRANCH}
          EOF

          git add -A
          git -c commit.gpgsign=false commit --allow-empty --file "${commit_message_file}"
          rm -f "${commit_message_file}"

          head_sha="$(git rev-parse HEAD)"
          git archive --format=tar "${head_sha}" > "${SNAPSHOT_FILE}"
          codex_output_sha256="$(sha256sum "${CODEX_OUTPUT_FILE}" | awk '{print $1}')"
          snapshot_sha256="$(sha256sum "${SNAPSHOT_FILE}" | awk '{print $1}')"

          jq -n \
            --arg repository "${REPOSITORY}" \
            --arg workflow_run_id "${WORKFLOW_RUN_ID}" \
            --arg workflow_run_attempt "${WORKFLOW_RUN_ATTEMPT}" \
            --arg actor "${ACTOR}" \
            --arg target_branch "${TARGET_BRANCH}" \
            --argjson target_branch_created "${TARGET_BRANCH_CREATED}" \
            --arg run_branch "${RUN_BRANCH}" \
            --arg base_sha "${BASE_SHA}" \
            --arg head_sha "${head_sha}" \
            --arg prompt "${PROMPT}" \
            --arg codex_output_sha256 "${codex_output_sha256}" \
            --arg snapshot_sha256 "${snapshot_sha256}" \
            --arg model "${CODEX_MODEL}" \
            --arg codex_version "${CODEX_VERSION}" \
            '{
              repository: $repository,
              workflow_run_id: $workflow_run_id,
              workflow_run_attempt: $workflow_run_attempt,
              actor: $actor,
              target_branch: $target_branch,
              target_branch_created: $target_branch_created,
              run_branch: $run_branch,
              base_sha: $base_sha,
              head_sha: $head_sha,
              prompt: $prompt,
              codex_output_sha256: $codex_output_sha256,
              branch_snapshot_sha256: $snapshot_sha256,
              model: $model,
              codex_version: $codex_version
            }' > "${PREDICATE_FILE}"

          cat > "${PR_BODY_FILE}" <<EOF
          ## Prompt

          \`\`\`\`\`\`\`\`
          ${PROMPT}
          \`\`\`\`\`\`\`\`

          ## Verify

          \`\`\`bash
          git fetch origin ${RUN_BRANCH}
          git archive --format=tar ${head_sha} > branch-snapshot.tar
          gh attestation verify branch-snapshot.tar -R ${REPOSITORY}
          gh attestation verify branch-snapshot.tar -R ${REPOSITORY} --predicate-type ${RUN_PREDICATE_TYPE} --format json --jq '.[].verificationResult.statement.predicate'
          git diff ${BASE_SHA} ${head_sha}
          \`\`\`

          Verify that the custom predicate reports:

          - \`base_sha\`: \`${BASE_SHA}\`
          - \`head_sha\`: \`${head_sha}\`
          - \`run_branch\`: \`${RUN_BRANCH}\`
          - \`codex_output_sha256\`: \`${codex_output_sha256}\`
          - \`branch_snapshot_sha256\`: \`${snapshot_sha256}\`
          EOF

          {
            echo "HEAD_SHA=${head_sha}"
            echo "COMMIT_TITLE=${commit_title}"
            echo "SNAPSHOT_SHA256=${snapshot_sha256}"
          } >> "${GITHUB_ENV}"

      - name: Create provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.SNAPSHOT_FILE }}

      - name: Create run attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.SNAPSHOT_FILE }}
          predicate-type: ${{ env.RUN_PREDICATE_TYPE }}
          predicate-path: ${{ env.PREDICATE_FILE }}

      - name: Push run branch
        run: git push --set-upstream origin "${RUN_BRANCH}"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_url="$(
            gh pr create \
              --base "${TARGET_BRANCH}" \
              --head "${RUN_BRANCH}" \
              --title "${COMMIT_TITLE}" \
              --body-file "${PR_BODY_FILE}"
          )"
          echo "PR_URL=${pr_url}" >> "${GITHUB_ENV}"

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-run-metadata-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.PREDICATE_FILE }}
            ${{ env.CODEX_OUTPUT_FILE }}
          retention-days: 14

      - name: Write workflow summary
        run: |
          {
            echo "## Codex Run"
            echo
            echo "- Target branch: \`${TARGET_BRANCH}\`"
            echo "- Target branch created: \`${TARGET_BRANCH_CREATED}\`"
            echo "- Base SHA: \`${BASE_SHA}\`"
            echo "- Head SHA: \`${HEAD_SHA}\`"
            echo "- Run branch: \`${RUN_BRANCH}\`"
            echo "- Branch snapshot SHA-256: \`${SNAPSHOT_SHA256}\`"
            echo "- Pull request: ${PR_URL}"
          } >> "${GITHUB_STEP_SUMMARY}"
