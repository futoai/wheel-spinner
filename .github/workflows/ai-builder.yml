name: Codex Direct Run

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to update directly.
        required: true
        type: string
      prompt:
        description: Exact Codex prompt to execute.
        required: true
        type: string
      start_commit:
        description: Optional commit to start from. Defaults to current target head.
        required: false
        default: ""
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: codex-${{ inputs.target_branch }}
  cancel-in-progress: false

jobs:
  codex-run:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ inputs.target_branch }}
      PROMPT: ${{ inputs.prompt }}
      START_COMMIT: ${{ inputs.start_commit }}
      CODEX_MODEL: gpt-5.3-codex
      CODEX_VERSION: 0.116.0
      CODEX_SANDBOX: danger-full-access
      CODEX_APPROVAL_POLICY: never
      CODEX_ARGS: '["--search"]'
      RUN_PREDICATE_TYPE: https://verifiable-codex.dev/codex-run/v2

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare metadata paths
        run: |
          {
            echo "META_DIR=${RUNNER_TEMP}/codex-run"
            echo "CODEX_OUTPUT_FILE=${RUNNER_TEMP}/codex-run/codex-output.md"
            echo "PREDICATE_FILE=${RUNNER_TEMP}/codex-run/codex-run-predicate.json"
            echo "SNAPSHOT_FILE=${RUNNER_TEMP}/codex-run/branch-snapshot.tar"
          } >> "$GITHUB_ENV"
          mkdir -p "${RUNNER_TEMP}/codex-run"

      - name: Resolve target, backup current head, and choose start point
        run: |
          set -euo pipefail

          if ! git check-ref-format --branch "${TARGET_BRANCH}" >/dev/null 2>&1; then
            echo "Invalid target branch: ${TARGET_BRANCH}" >&2
            exit 1
          fi

          git fetch --no-tags origin "+refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}"

          previous_target_sha="$(git rev-parse "origin/${TARGET_BRANCH}")"

          if [[ -n "${START_COMMIT}" ]]; then
            git fetch --no-tags origin "${START_COMMIT}" || true
            start_sha="$(git rev-parse "${START_COMMIT}^{commit}")"
          else
            start_sha="${previous_target_sha}"
          fi

          # Strongly recommended: only allow replay from target branch history.
          git merge-base --is-ancestor "${start_sha}" "origin/${TARGET_BRANCH}"

          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          target_branch_slug="$(printf '%s' "${TARGET_BRANCH}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._/-]+/-/g')"
          backup_branch="backup/${target_branch_slug}/${timestamp}-${previous_target_sha:0:12}"

          git branch -f "${backup_branch}" "${previous_target_sha}"
          git push origin "refs/heads/${backup_branch}:refs/heads/${backup_branch}"

          git switch --detach "${start_sha}"

          prompt_compact="$(printf '%s' "${PROMPT}" | tr '\r\n\t' ' ' | tr -s '[:space:]' ' ' | sed -E 's/^ //; s/ $//')"
          prompt_summary="$(printf '%s' "${prompt_compact}" | sed -E 's/^(.{0,60}).*$/\1/; s#[ .,:;_/-]+$##')"
          prompt_summary="${prompt_summary:-run}"

          {
            echo "PREVIOUS_TARGET_SHA=${previous_target_sha}"
            echo "START_SHA=${start_sha}"
            echo "BACKUP_BRANCH=${backup_branch}"
            echo "PROMPT_SUMMARY=${prompt_summary}"
          } >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Codex
        shell: bash
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          set -euo pipefail

          npm i -g @openai/codex@${CODEX_VERSION}

          export HOME="$RUNNER_TEMP/codex-home"
          mkdir -p "$HOME/.codex"
          chmod 700 "$HOME/.codex"

          cleanup() {
            shred -u "$HOME/.codex/auth.json" 2>/dev/null || rm -f "$HOME/.codex/auth.json"
          }
          trap cleanup EXIT

          printf '%s' "$CODEX_AUTH_JSON" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"
          unset CODEX_AUTH_JSON

          eval "EXTRA_ARGS=($(echo "$CODEX_ARGS" | jq -r '.[] | @sh'))"

          printf '%s' "$PROMPT" | codex \
            --ask-for-approval "$CODEX_APPROVAL_POLICY" \
            "${EXTRA_ARGS[@]}" \
            exec \
            --model "$CODEX_MODEL" \
            --sandbox "$CODEX_SANDBOX" \
            --output-last-message "$CODEX_OUTPUT_FILE" \
            -

      - name: Commit directly with prompt and Codex output
        env:
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          commit_title="codex: ${PROMPT_SUMMARY}"
          commit_message_file="$(mktemp)"

          {
            echo "${commit_title}"
            echo
            echo "Prompt:"
            echo "${PROMPT}"
            echo
            echo "Target-Branch: ${TARGET_BRANCH}"
            echo "Previous-Target-SHA: ${PREVIOUS_TARGET_SHA}"
            echo "Start-SHA: ${START_SHA}"
            echo "Backup-Branch: ${BACKUP_BRANCH}"
            echo
            echo "Codex-Last-Output:"
            cat "${CODEX_OUTPUT_FILE}"
          } > "${commit_message_file}"

          git add -A
          git -c commit.gpgsign=false commit --allow-empty --file "${commit_message_file}"
          rm -f "${commit_message_file}"

          head_sha="$(git rev-parse HEAD)"
          git archive --format=tar "${head_sha}" > "${SNAPSHOT_FILE}"
          codex_output_sha256="$(sha256sum "${CODEX_OUTPUT_FILE}" | awk '{print $1}')"
          snapshot_sha256="$(sha256sum "${SNAPSHOT_FILE}" | awk '{print $1}')"

          jq -n \
            --arg repository "${REPOSITORY}" \
            --arg workflow_run_id "${WORKFLOW_RUN_ID}" \
            --arg workflow_run_attempt "${WORKFLOW_RUN_ATTEMPT}" \
            --arg actor "${ACTOR}" \
            --arg target_branch "${TARGET_BRANCH}" \
            --arg previous_target_sha "${PREVIOUS_TARGET_SHA}" \
            --arg start_sha "${START_SHA}" \
            --arg backup_branch "${BACKUP_BRANCH}" \
            --arg head_sha "${head_sha}" \
            --arg prompt "${PROMPT}" \
            --arg codex_output_sha256 "${codex_output_sha256}" \
            --arg branch_snapshot_sha256 "${snapshot_sha256}" \
            --arg model "${CODEX_MODEL}" \
            --arg codex_version "${CODEX_VERSION}" \
            '{
              repository: $repository,
              workflow_run_id: $workflow_run_id,
              workflow_run_attempt: $workflow_run_attempt,
              actor: $actor,
              target_branch: $target_branch,
              previous_target_sha: $previous_target_sha,
              start_sha: $start_sha,
              backup_branch: $backup_branch,
              head_sha: $head_sha,
              prompt: $prompt,
              codex_output_sha256: $codex_output_sha256,
              branch_snapshot_sha256: $branch_snapshot_sha256,
              model: $model,
              codex_version: $codex_version
            }' > "${PREDICATE_FILE}"

          {
            echo "HEAD_SHA=${head_sha}"
            echo "SNAPSHOT_SHA256=${snapshot_sha256}"
          } >> "$GITHUB_ENV"

      - name: Create provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.SNAPSHOT_FILE }}

      - name: Create run attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.SNAPSHOT_FILE }}
          predicate-type: ${{ env.RUN_PREDICATE_TYPE }}
          predicate-path: ${{ env.PREDICATE_FILE }}

      - name: Push directly to target branch
        run: |
          set -euo pipefail
          git push \
            --force-with-lease=refs/heads/${TARGET_BRANCH}:${PREVIOUS_TARGET_SHA} \
            origin \
            HEAD:refs/heads/${TARGET_BRANCH}

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-run-metadata-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.PREDICATE_FILE }}
            ${{ env.CODEX_OUTPUT_FILE }}
          retention-days: 14

      - name: Write workflow summary
        run: |
          {
            echo "## Codex Direct Run"
            echo
            echo "- Target branch: \`${TARGET_BRANCH}\`"
            echo "- Previous target SHA: \`${PREVIOUS_TARGET_SHA}\`"
            echo "- Start SHA: \`${START_SHA}\`"
            echo "- New head SHA: \`${HEAD_SHA}\`"
            echo "- Backup branch: \`${BACKUP_BRANCH}\`"
            echo "- Branch snapshot SHA-256: \`${SNAPSHOT_SHA256}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
