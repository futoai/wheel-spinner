<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Counter App</title>
  <style>
    :root {
      --bg: #f7fafc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #e6fffb 0%, var(--bg) 45%);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
    }

    .card {
      width: min(92vw, 420px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      letter-spacing: 0.01em;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    #count {
      margin: 0 0 22px;
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: var(--primary);
      transition: transform 120ms ease, background-color 120ms ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:active {
      transform: translateY(1px);
    }

    .danger {
      background: var(--danger);
    }

    .danger:hover {
      background: var(--danger-hover);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Counter App</h1>
    <p>Click the buttons to change the value.</p>
    <div id="count" aria-live="polite">0</div>
    <div class="buttons">
      <button id="decrement" type="button">-1</button>
      <button id="increment" type="button">+1</button>
      <button id="reset" class="danger" type="button">Reset</button>
    </div>
  </main>

  <script>
    const countEl = document.getElementById("count");
    const incrementBtn = document.getElementById("increment");
    const decrementBtn = document.getElementById("decrement");
    const resetBtn = document.getElementById("reset");

    let count = 0;

    function render() {
      countEl.textContent = String(count);
    }

    incrementBtn.addEventListener("click", () => {
      count += 1;
      render();
    });

    decrementBtn.addEventListener("click", () => {
      count -= 1;
      render();
    });

    resetBtn.addEventListener("click", () => {
      count = 0;
      render();
    });

    render();
  </script>
</body>
</html>
