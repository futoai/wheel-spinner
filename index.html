<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter App</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #eef4ff, var(--bg) 55%);
      color: var(--text);
      padding: 1rem;
    }

    .app {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .count {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 700;
      margin: 1.2rem 0;
      line-height: 1;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 0.7rem 0.9rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
      transition: background 0.15s ease, transform 0.05s ease;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button:active {
      transform: translateY(1px);
    }

    .reset {
      background: var(--danger);
    }

    .reset:hover {
      background: var(--danger-hover);
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Counter</h1>
    <p>Simple single-file counter app</p>
    <div id="count" class="count" aria-live="polite">0</div>

    <div class="controls">
      <button id="decrement" type="button" aria-label="Decrement">-1</button>
      <button id="reset" class="reset" type="button" aria-label="Reset">Reset</button>
      <button id="increment" type="button" aria-label="Increment">+1</button>
    </div>
  </main>

  <script>
    const countEl = document.getElementById('count');
    const incrementBtn = document.getElementById('increment');
    const decrementBtn = document.getElementById('decrement');
    const resetBtn = document.getElementById('reset');

    let count = 0;

    function render() {
      countEl.textContent = String(count);
    }

    incrementBtn.addEventListener('click', () => {
      count += 1;
      render();
    });

    decrementBtn.addEventListener('click', () => {
      count -= 1;
      render();
    });

    resetBtn.addEventListener('click', () => {
      count = 0;
      render();
    });
  </script>
</body>
</html>
