<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter App</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --accent: #2563eb;
      --muted: #6b7280;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg), #e9eef7);
      color: var(--text);
    }

    .app {
      background: var(--card);
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(31, 41, 55, 0.12);
      width: min(92vw, 320px);
      text-align: center;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: 1.2rem;
      color: var(--muted);
    }

    .count {
      font-size: 3rem;
      font-weight: 700;
      margin: 0.25rem 0 1rem;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 0.6rem 0.5rem;
      cursor: pointer;
      font-weight: 600;
      color: white;
      background: var(--accent);
    }

    .reset { background: var(--danger); }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <main class="app">
    <h1>Counter</h1>
    <p id="count" class="count">0</p>
    <div class="buttons">
      <button id="decrement" aria-label="Decrement">-1</button>
      <button id="increment" aria-label="Increment">+1</button>
      <button id="reset" class="reset" aria-label="Reset">Reset</button>
    </div>
  </main>

  <script>
    let value = 0;
    const countEl = document.getElementById('count');

    function render() {
      countEl.textContent = value;
    }

    document.getElementById('increment').addEventListener('click', () => {
      value += 1;
      render();
    });

    document.getElementById('decrement').addEventListener('click', () => {
      value -= 1;
      render();
    });

    document.getElementById('reset').addEventListener('click', () => {
      value = 0;
      render();
    });
  </script>
</body>
</html>
