<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Counter App</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @plugin "daisyui";
  </style>
</head>
<body class="min-h-screen bg-base-200 grid place-items-center p-4">
  <main class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body items-center text-center gap-5">
      <h1 class="card-title text-3xl">Counter App</h1>
      <p class="text-base-content/70">Click the buttons to change the value.</p>
      <div id="count" aria-live="polite" class="badge badge-primary badge-lg h-16 min-w-24 text-4xl font-bold">0</div>
      <div class="flex gap-2 justify-center flex-wrap">
        <button id="decrement" class="btn btn-outline btn-primary" type="button">-1</button>
        <button id="increment" class="btn btn-primary" type="button">+1</button>
        <button id="reset" class="btn btn-error" type="button">Reset</button>
      </div>
    </div>
  </main>

  <script>
    const countEl = document.getElementById("count");
    const incrementBtn = document.getElementById("increment");
    const decrementBtn = document.getElementById("decrement");
    const resetBtn = document.getElementById("reset");

    let count = 0;

    function render() {
      countEl.textContent = String(count);
    }

    incrementBtn.addEventListener("click", () => {
      count += 1;
      render();
    });

    decrementBtn.addEventListener("click", () => {
      count -= 1;
      render();
    });

    resetBtn.addEventListener("click", () => {
      count = 0;
      render();
    });

    render();
  </script>
</body>
</html>
