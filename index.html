<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score Counter</title>
  <style>
    :root {
      font-family: Helvetica, Arial, sans-serif;
      color: #1f2937;
      background: #f3f4f6;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .card {
      text-align: center;
      background: #ffffff;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      width: min(90vw, 360px);
    }

    h1 {
      margin: 0 0 1rem;
      font-size: 1.5rem;
    }

    .score {
      font-size: 3rem;
      font-weight: 700;
      margin: 0 0 1.5rem;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 0.9rem 1.4rem;
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      background: #2563eb;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Score</h1>
    <p class="score" id="score">0</p>
    <button id="incrementButton" type="button">Increase Score</button>
  </main>

  <script>
    const scoreDisplay = document.getElementById("score");
    const incrementButton = document.getElementById("incrementButton");
    let score = 0;

    incrementButton.addEventListener("click", () => {
      score += 1;
      scoreDisplay.textContent = score;
    });
  </script>
</body>
</html>
