<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Counter App</title>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Segoe UI", "Tahoma", "Geneva", "Verdana", "sans-serif"],
          },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen grid place-items-center bg-[radial-gradient(circle_at_top,_#e6fffb_0%,_#f7fafc_45%)] text-gray-800">
  <main class="w-[min(92vw,420px)] rounded-2xl border border-gray-200 bg-white p-6 text-center shadow-[0_8px_24px_rgba(0,0,0,0.08)] sm:p-7">
    <h1 class="mb-2 text-2xl font-semibold tracking-tight">Counter App</h1>
    <p class="mb-6 text-sm text-gray-500">Click the buttons to change the value.</p>

    <div id="count" aria-live="polite" class="mb-6 text-5xl font-bold leading-none">0</div>

    <div class="flex flex-wrap justify-center gap-2.5">
      <button
        id="decrement"
        type="button"
        class="rounded-lg bg-teal-700 px-3.5 py-2.5 text-sm font-semibold text-white shadow-sm transition-all duration-200 ease-out hover:-translate-y-0.5 hover:bg-teal-800 hover:shadow-md active:translate-y-0 active:scale-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-300 focus-visible:ring-offset-2"
      >
        -1
      </button>
      <button
        id="increment"
        type="button"
        class="rounded-lg bg-teal-700 px-3.5 py-2.5 text-sm font-semibold text-white shadow-sm transition-all duration-200 ease-out hover:-translate-y-0.5 hover:bg-teal-800 hover:shadow-md active:translate-y-0 active:scale-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-300 focus-visible:ring-offset-2"
      >
        +1
      </button>
      <button
        id="reset"
        type="button"
        class="rounded-lg bg-red-600 px-3.5 py-2.5 text-sm font-semibold text-white shadow-sm transition-all duration-200 ease-out hover:-translate-y-0.5 hover:bg-red-700 hover:shadow-md active:translate-y-0 active:scale-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-red-300 focus-visible:ring-offset-2"
      >
        Reset
      </button>
    </div>
  </main>

  <script>
    const countEl = document.getElementById("count");
    const incrementBtn = document.getElementById("increment");
    const decrementBtn = document.getElementById("decrement");
    const resetBtn = document.getElementById("reset");

    let count = 0;

    function render() {
      countEl.textContent = String(count);
    }

    incrementBtn.addEventListener("click", () => {
      count += 1;
      render();
    });

    decrementBtn.addEventListener("click", () => {
      count -= 1;
      render();
    });

    resetBtn.addEventListener("click", () => {
      count = 0;
      render();
    });

    render();
  </script>
</body>
</html>
