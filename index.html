<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score Counter</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f4f7fb, #dfe8f5);
    }

    .card {
      padding: 2rem;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
      text-align: center;
    }

    .score {
      margin: 0 0 1rem;
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 0.9rem 1.4rem;
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      background: #2563eb;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="score">Score: <span id="score">0</span></p>
    <button id="increment" type="button">Increase Score</button>
  </main>

  <script>
    const scoreElement = document.getElementById("score");
    const incrementButton = document.getElementById("increment");
    let score = 0;

    incrementButton.addEventListener("click", () => {
      score += 1;
      scoreElement.textContent = score;
    });
  </script>
</body>
</html>
