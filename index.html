<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="m-0 grid min-h-screen place-items-center bg-gradient-to-b from-blue-50 to-slate-100 p-4 font-sans text-slate-800">
  <main class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 text-center shadow-xl shadow-slate-300/30">
    <h1 class="mb-2 text-2xl font-bold">Counter</h1>
    <p class="text-sm text-slate-500">Simple single-file counter app</p>
    <div id="count" class="my-5 text-5xl font-bold leading-none sm:text-6xl" aria-live="polite">0</div>

    <div class="grid grid-cols-3 gap-2.5">
      <button id="decrement" type="button" aria-label="Decrement" class="rounded-lg bg-blue-600 px-3 py-2.5 text-base font-semibold text-white transition hover:bg-blue-700 active:translate-y-px">-1</button>
      <button id="reset" type="button" aria-label="Reset" class="rounded-lg bg-red-600 px-3 py-2.5 text-base font-semibold text-white transition hover:bg-red-700 active:translate-y-px">Reset</button>
      <button id="increment" type="button" aria-label="Increment" class="rounded-lg bg-blue-600 px-3 py-2.5 text-base font-semibold text-white transition hover:bg-blue-700 active:translate-y-px">+1</button>
    </div>
  </main>

  <script>
    const countEl = document.getElementById('count');
    const incrementBtn = document.getElementById('increment');
    const decrementBtn = document.getElementById('decrement');
    const resetBtn = document.getElementById('reset');

    let count = 0;

    function render() {
      countEl.textContent = String(count);
    }

    incrementBtn.addEventListener('click', () => {
      count += 1;
      render();
    });

    decrementBtn.addEventListener('click', () => {
      count -= 1;
      render();
    });

    resetBtn.addEventListener('click', () => {
      count = 0;
      render();
    });
  </script>
</body>
</html>
