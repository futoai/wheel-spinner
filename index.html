<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score Counter</title>
  <style>
    :root {
      font-family: Helvetica, Arial, sans-serif;
      color: #1f2937;
      background: #f3f4f6;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .card {
      position: relative;
      overflow: hidden;
      text-align: center;
      background: #ffffff;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      width: min(90vw, 360px);
    }

    h1 {
      margin: 0 0 1rem;
      font-size: 1.5rem;
    }

    .score {
      font-size: 3rem;
      font-weight: 700;
      margin: 0 0 1.5rem;
      transition: transform 180ms ease, color 180ms ease;
    }

    button {
      position: relative;
      border: 0;
      border-radius: 999px;
      padding: 0.9rem 1.4rem;
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.28);
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(37, 99, 235, 0.34);
      filter: saturate(1.08);
    }

    button:active,
    button.is-clicked {
      transform: translateY(1px) scale(0.96);
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.28);
    }

    .score.bump {
      transform: scale(1.18) rotate(-4deg);
      color: #7c3aed;
    }

    .burst {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--color);
      pointer-events: none;
      animation: burst 650ms cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
    }

    @keyframes burst {
      from {
        transform: translate(-50%, -50%) scale(0.2);
        opacity: 1;
      }

      to {
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.4);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Score</h1>
    <p class="score" id="score">0</p>
    <button id="incrementButton" type="button">Increase Score</button>
  </main>

  <script>
    const scoreDisplay = document.getElementById("score");
    const incrementButton = document.getElementById("incrementButton");
    const card = document.querySelector(".card");
    let score = 0;
    let clickAnimationTimeout;

    function createBurst(originX, originY) {
      const colors = ["#2563eb", "#7c3aed", "#f59e0b", "#ec4899", "#10b981"];

      for (let i = 0; i < 12; i += 1) {
        const burst = document.createElement("span");
        const angle = (Math.PI * 2 * i) / 12;
        const distance = 34 + Math.random() * 32;

        burst.className = "burst";
        burst.style.setProperty("--x", `${originX}px`);
        burst.style.setProperty("--y", `${originY}px`);
        burst.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
        burst.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
        burst.style.setProperty("--color", colors[i % colors.length]);
        card.appendChild(burst);

        burst.addEventListener("animationend", () => burst.remove(), { once: true });
      }
    }

    incrementButton.addEventListener("click", () => {
      const buttonRect = incrementButton.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();
      const originX = buttonRect.left - cardRect.left + buttonRect.width / 2;
      const originY = buttonRect.top - cardRect.top + buttonRect.height / 2;

      score += 1;
      scoreDisplay.textContent = score;
      scoreDisplay.classList.remove("bump");
      incrementButton.classList.add("is-clicked");
      void scoreDisplay.offsetWidth;
      scoreDisplay.classList.add("bump");
      createBurst(originX, originY);

      clearTimeout(clickAnimationTimeout);
      clickAnimationTimeout = setTimeout(() => {
        scoreDisplay.classList.remove("bump");
        incrementButton.classList.remove("is-clicked");
      }, 180);
    });
  </script>
</body>
</html>
